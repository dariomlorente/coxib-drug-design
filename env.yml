name: coxibs
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Core scientific stack
  - rdkit>=2023.9
  - pandas>=2.0
  - openpyxl>=3.1
  - numpy>=1.26
  - matplotlib>=3.8
  # HTTP client for Enamine API
  - requests>=2.31
  # Jupyter environment
  - jupyter
  - jupyterlab
  - ipykernel
  # ALMOS CLI for Phase 3 clustering
  - pip
  - pip:
      - almos-kit
